<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{escaped_title}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #16181d;
        --muted: #5f6877;
        --border: #d8dee8;
        --accent: #0f766e;
        --accent-soft: #e4f4f1;
        --code-bg: #f1f4f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.58;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        border-right: 1px solid var(--border);
        background: #eef2f6;
        padding: 28px 22px;
      }

      .sidebar h1 {
        margin: 0 0 18px;
        font-size: 17px;
        line-height: 1.35;
      }

      .toc {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .toc li {
        margin: 0;
      }

      .toc a {
        display: block;
        border-radius: 6px;
        color: var(--muted);
        padding: 5px 7px;
        text-decoration: none;
      }

      .toc a:hover {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .toc .depth-2 a {
        padding-left: 17px;
      }

      .toc .depth-3 a {
        padding-left: 29px;
        font-size: 14px;
      }

      main {
        max-width: 1120px;
        width: 100%;
        margin: 0 auto;
        padding: 40px 48px 72px;
      }

      article {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 38px 42px;
      }

      h1,
      h2,
      h3,
      h4 {
        line-height: 1.28;
      }

      h1 {
        margin: 0 0 26px;
        font-size: 30px;
      }

      h2 {
        border-top: 1px solid var(--border);
        margin: 34px 0 14px;
        padding-top: 24px;
        font-size: 23px;
      }

      h3 {
        margin: 28px 0 10px;
        font-size: 18px;
      }

      h4 {
        margin: 22px 0 8px;
        font-size: 15px;
      }

      p,
      ul,
      ol {
        margin: 10px 0;
      }

      a {
        color: var(--accent);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0 22px;
        font-size: 14px;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f1f5f9;
        font-weight: 650;
      }

      code {
        border-radius: 4px;
        background: var(--code-bg);
        padding: 1px 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.92em;
      }

      pre {
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #101923;
        color: #e5edf5;
        padding: 14px 16px;
      }

      pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      @media (max-width: 860px) {
        .layout {
          display: block;
        }

        .sidebar {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        main {
          padding: 24px 16px 44px;
        }

        article {
          padding: 24px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>{escaped_title}</h1>
        <ol class="toc">
          {toc_items}
        </ol>
      </aside>
      <main>
        <article>{report_body}</article>
      </main>
    </div>
  </body>
</html>
